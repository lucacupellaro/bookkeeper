name: Java CI with Maven

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'maven'

          -name: Run only DigestManagerTest in bookkeeper-server
          run: mvn -pl bookkeeper-server -Dtest=org.apache.bookkeeper.proto.checksum.DigestManagerTest test